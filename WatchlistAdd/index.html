<script type="text/javascript" charset="utf-8">
  var tabulate = function (data,columns) {
      var recents = d3.select('#rows').selectAll('tr')
        .data(data)
        .enter()
        .append('tr')
          
      var nominee = recents.selectAll('td')
          .data(function (row) {
                return columns.map(function (column) {
                  return { 
                    column: column, 
                    value: row[column],
                    votes: row["imdbVotes"],
                    link: row["FilmID"]
                  }
                })
              })
          .enter()
          .append('td')
          .html(function(d){
            if (d.column === "FilmName") {
              return "<a href=\"https://www.imdb.com/title/" + d.link + "\">" + d.value + "</a>"
            }
            else if (d.column === "imdbRating") {
              return d.value + " (" + d.votes.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",") + ")"
            }
            else {
              return d.value
            }
          })
     }

d3.csv('https://jacobmgreer.github.io/Media-Consumption/datasets/Oscars/OscarsFilmSummary.csv',function (data) {
  var data = data
              .filter(element => element.FilmName != "NA")
              .filter(element => element.Rating === "NA")
              .filter(element => element.Watchlist != "Y")
  var columns = ['AwardCeremony','Type','FilmName','Year','imdbRating','Runtime','Losses','Wins']
  tabulate(data,columns)
})
</script>

            <th scope="col">Wins</th>
          </tr>
        </thead>

        </tbody>
      </table>

    </div>
