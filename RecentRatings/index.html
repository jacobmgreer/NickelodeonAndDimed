<script type="text/javascript" charset="utf-8">
  var tabulate = function (data,columns) {
    var carddeck = d3.select('#rows')
    
    var cards = carddeck.selectAll('.row')
      .data(data)
      .enter()
      
      .append('tr')
      .classed('row', true)
      
    var info = cardtext
      .selectAll('tr')
      .data(function(row) {
        return columns.map(function (column) {
          return { 
            column: column, 
            value: row[column]}
        })
      })
      .enter()
      
     var item.rated = cardtext
      .append('th')
      .html(function (d) { return d["Rated.Date"] })

     var item.title = cardtext
      .append('td')
      .html(function (d) { return d["Item.Title"] })

     var item.year = cardtext
      .append('td')
      .html(function (d) { return d["Item.Year"] })
     
     var item.rating = cardtext
      .append('td')
      .html(function (d) { return d["Rating"] })
        
     var item.imdbrating = cardtext
      .append('td')
      .html(function (d) { return d["imdbRating"] })
    
    return carddeck;
  }

d3.csv('https://jacobmgreer.github.io/Media-Consumption/ratings/formatted.csv',function (data) {

})
