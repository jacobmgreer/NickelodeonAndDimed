<script type="text/javascript" charset="utf-8">
  var tabulate = function (data,columns) {
      var recents = d3.select('#rows').selectAll('tr')
        .data(data)
        .enter()
        .append('tr')
          
      var nominee = recents.selectAll('td')
          .data(function (row) {
                return columns.map(function (column) {
                  return { 
                    column: column, 
                    value: row[column],
                    link: row["IMDBid"]
                  }
                })
              })
          .enter()
          .append('td')
          .html(function(d){
            if (d.column === "Item.Title") {
              return "<a href=\"https://www.imdb.com/title/" + d.link + "\">" + d.value + "</a>"
            }
            else if (d.column === "Num.Votes") {
              return d.value.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",")
            }
            else {
              return d.value
            }
          })
     }

d3.csv('https://jacobmgreer.github.io/Media-Consumption/ratings/formatted.csv',function (data) {
  var data = data
              .filter(element => element.Title != "NA")
              .slice(0,26)
  var columns = ['Rated.Date','Type','Item.Title','Year','Rating','imdbRating','Num.Votes']
  tabulate(data,columns)
})
</script>
