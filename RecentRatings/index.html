---
title: Recently Rated Films
layout: default
---

<script type="text/javascript" charset="utf-8">
  var tabulate = function (data,columns) {
    var carddeck = d3.select('#cards')
    
    var cards = carddeck.selectAll('.card')
      .data(data)
      .enter()
      
      .append('div')
      .classed('container', true)
      .classed('mx-auto', true)
      .style('width','960px')
      .style('margin-top','25px')
      
      .append('div')
      .classed('row', true)
      .classed('g0', true)
    
    var cardtext = cards
      .append('div')
      .classed('col-md-8', true)
      
      .append('div')
      .classed('card-body', true)
      
    var info = cardtext
      .selectAll('p')
      .data(function(row) {
        return columns.map(function (column) {
          return { 
            column: column, 
            value: row[column], 
            link: row["IMDBid"], 
            votes: row["Num.Votes"], 
            release: row["Released"]}
        })
      })
      .enter()
      
      .append('p')
      .classed('card-text', true)
      .html(function (d) { 
        if (d.column === "Item.Title") {return "<h5 class=\"card-title\"><a href=\"https://www.imdb.com/title/" + d.link + "\">" + d.value + "</a>" + " (" + d.release + ")</h5>"}
        else if (d.column === "Rating") {return "My Rating: " + d.value}
        else if (d.column === "imdbRating") {return "Internet Movie Database: " + d.value}
        else {return d.value}})
        
     var footer = cardtext
      .append('p')
      .classed('card-text', true)
      .append('small')
      .classed('text-muted', true)
      .html(function (d) { return d["Rated.Date"] })
    
    return carddeck;
  }

d3.csv('https://jacobmgreer.github.io/Media-Consumption/ratings/formatted.csv',function (data) {
  var data = data
              .filter(element => element.Title != "NA")
              .slice(0,26)
  var columns = ['Item.Title','Rating','imdbRating']
  tabulate(data,columns)
})
</script>
  
  <div class="container">
    <br/>
    <h1 class="display-5 text-center">Recently Rated Films</h1>
    <br/>
    <div id="cards"></div>
    <br/><br/>
  </div>
