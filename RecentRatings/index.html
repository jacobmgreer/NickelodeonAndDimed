<script type="text/javascript" charset="utf-8">
  var tabulate = function (data,columns) {
      var recents = d3.select('#rows').selectAll('tr')
        .data(data)
        .enter()
        
      recents.append('tr')
          
      var nominee = recents.selectAll('td')
          .data(function (row) {
                return columns.map(function (column) {
                  return { 
                    column: column, 
                    value: row[column]
                  }
                })
              })
          .enter()
          
      nominee
        .append('td')
        .html(function(d){return d.value})
          
     }

d3.csv('https://jacobmgreer.github.io/Media-Consumption/ratings/formatted.csv',function (data) {
  var data = data
              .filter(element => element.Title != "NA")
              .slice(0,26)
  var columns = ['Rated.Date','Item.Title','Year','Rating','imdbRating']
  tabulate(data,columns)
})
</script>
  
  <div class="container">
    <br/>
    <h1 class="display-5 text-center">Recently Rated Films</h1>
    <br/>
    <div class="mx-auto container" style="width: 760px; margin-top:25px;">
      <table class="table">
        <thead>
          <tr>
            <th scope="col">Date Rated</th>
            <th scope="col">Film Title</th>
            <th scope="col">Film Year</th>
            <th scope="col">My Rating</th>
            <th scope="col">IMDb Rating</th>
          </tr>
        </thead>
        <tbody id="rows">
        </tbody>
      </table>
      <br/><br/>
    </div>
  </div>
