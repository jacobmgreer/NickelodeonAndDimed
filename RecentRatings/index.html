title: Recently Rated Films
layout: default

<script type="text/javascript" charset="utf-8">
  var tabulate = function (data,columns) {
    var carddeck = d3.select('#rows')
    
    var cards = carddeck.selectAll('.row')
      .data(data)
      .enter()
      
      .append('tr')
      .classed('row', true)
      
    var info = cards
      .selectAll('tr')
      .data(function(row) {
        return columns.map(function (column) {
          return { 
            column: column, 
            value: row[column],
            link: row["IMDBid"],
            votes: row["Num.Votes"],
            year: row["Year"]}
        })
      })
      .enter()
      .html(function (d) { 
        if(d.column === "Rated.Date") {return "<th scope=\"row\">" + d.value + "</th>"}
        if (d.column === "ItemTitle") {return "<td><a href=\"https://www.imdb.com/title/" + d.link + "\">" + d.value + "</a>" + " (" + d.year + ")</td>"}
        else if (d.column === "Rating") {return "<td>My Rating: " + d.value + "</td>"}
        else if (d.column === "Internet Movie Database") {return "<td>Internet Movie Database: " + d.value + " (" + d.votes + ")</td>"}
      })
    
    return carddeck;
  }

d3.csv('https://jacobmgreer.github.io/Media-Consumption/ratings/formatted.csv',function (data) {
  var data = data
              .filter(element => element.Title != "NA")
              .slice(0,26)
  var columns = ['Rated.Date','Item.Title','Rating','imdbRating']
  tabulate(data,columns)
})
</script>
  
  <div class="container">
    <br/>
    <h1 class="display-5 text-center">Recently Rated Films</h1>
    <br/>
    <div class="mx-auto container" style="width: 760px; margin-top:25px;">
      <table class="table">
        <thead>
          <tr>
            <th scope="col">Date Rated</th>
            <th scope="col">Title</th>
            <th scope="col">Year</th>
            <th scope="col">Rating</th>
            <th scope="col">IMDB Rating</th>
          </tr>
        </thead>
        <tbody id="rows">
        </tbody>
      </table>
      <br/><br/>
    </div>
  </div>
