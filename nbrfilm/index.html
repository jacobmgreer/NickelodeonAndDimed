---
title: "National Board of Review - Film Awards"
layout: default
---


<style>
  td.watched {background-color:#D8FFDB;}
  td.watched a {color:#023535;}
  td.watched a:hover {color:#008F8C;} 
  /* color guide https://color.adobe.com/Teal%20and%20Mint-color-theme-19170869 */
</style>


<div class="container-fluid" style="height:960px;">
  <svg width="960" height="960" class="center"></svg>
  <div id="tooltip" class="center">
    <h3>National Board of Review<br/>Film Awards:<br/>Percentage Seen<br/>by Award Ceremony</h3>
  </div>
</div>

<script>
  var svg = d3.select("svg"),
      width = +svg.attr("width"),
      height = +svg.attr("height"),
      innerRadius = 130,
      outerRadius = Math.min(width, height) / 2,
      g = svg.append("g").attr("transform", "translate(" + width / 2 + "," + height / 2 + ")");

  var x = d3.scaleBand()
      .range([0, 2 * Math.PI])
      .align(0);

  var y = d3.scaleRadial()
      .range([innerRadius, outerRadius]);

  var z = d3.scaleOrdinal()
      .range(["#D8FFDB", "#023535", "#7b6888", "#6b486b", "#a05d56", "#d0743c", "#ff8c00"]);

  var tooltip = d3.select('#tooltip');

  d3.csv("https://jacobmgreer.github.io/Media-Consumption/datasets/NBR/NBRSummary.csv", function(d, i, columns) {
    for (i = 1, t = 0; i < columns.length; ++i) t += d[columns[i]] = +d[columns[i]];
    d.total = t;
    return d;
  }, function(error, data) {
    if (error) throw error;

    x.domain(data.map(function(d) { return d.Year; }));
    y.domain([0, d3.max(data, function(d) { return d.total; })]);
    z.domain(data.columns.slice(1));
    
    g.append("g")
      .selectAll("g")
      .data(d3.stack().keys(data.columns.slice(1))(data))
      .enter().append("g")
        .attr("fill", function(d) { return z(d.key); })
      .selectAll("path")
      .data(function(d) { return d; })
      .enter().append("path")
        .attr("d", d3.arc()
            .innerRadius(function(d) { return y(d[0]); })
            .outerRadius(function(d) { return y(d[1]); })
            .startAngle(function(d) { return x(d.data.Year); })
            .endAngle(function(d) { return x(d.data.Year) + x.bandwidth(); })
            .padAngle(0.01)
            .padRadius(innerRadius))
      .on('mouseover', function(d) {
        tooltip
          .style('display', 'block')
          .html('<h1> ' + d.data.Year + '</h1>');
      })
      .on('click', function(d) {awardTable(d.data.Year)})
      .on('mouseout', function(d) {tooltip.html('<h3>National Board of Review<br/>Film Awards:<br/>Percentage Seen<br/>by Award Ceremony</h3>');});
  });
</script>

<div class="container-fluid">
  <br/><br/>
  <div id="switch">
    <h1 class="display-5 text-center">National Board of Review</h1>
    <h3 class="display-6 text-center" id="subt">Annual Film Awards</h3>
    <br/><br/>
    <div class="table-prime"></div>
  </div>
  
  <script type="text/javascript">
  
  function awardTable(ceremony) {
    $("#switch").empty();
    var data = [];
    d3.csv('https://jacobmgreer.github.io/Media-Consumption/datasets/NBR/NBRData.csv', function(data){
        var data = data.filter(element => element.AwardCeremony === ceremony)
        var nested_data = d3.nest()
                            .key(function(d) { return d.AwardCeremony; })
                            .key(function(d) { return d.AwardCategory; })
                            .entries(data);
                            //console.log(nested_data)
                            //console.log(nested_data[[0]].values)
        doSomething(nested_data);
    })
    
    function doSomething(d){
          
      var columns = ['Title','PersonName','Your.Rating','IMDb.Rating','Num.Votes']
    
      var AwardCeremonies = d3.select('#switch').selectAll('div')
        .data(d)
        .enter()
        .append('div')
        .html(function(d){return "<h1 class=\"display-5 text-center\" id=\"type-details\">" + d.key + "</h1>"})
        
      var data1 = function(d) {return d.values}
        
      var AwardCategories = AwardCeremonies.selectAll('div')
        .data(data1)
        .enter()
        .append('div')
        .html(function(d){return '<h3>' + d.key + '</h3>'})
        .append('table')
        .classed('table', true)
        .classed('table-striped', true)
        .style('table-layout',"fixed")
        
      AwardCategories.append('thead')
        .append('tr')
        .selectAll('th')
          .data(columns)
          .enter()
        .append('th')
          .attr('scope', 'col')
          .text(function (d) { return d })
         
      var tbody = AwardCategories.append('tbody')
      
      var data2 = function(d) {return d.values}
      
      var rows = tbody.selectAll('tr')
          .data(data2)
          .enter()
          .append('tr')
          
      var nominee = rows.selectAll('td')
          .data(function (row) {
                return columns.map(function (column) {
                  return { 
                    column: column, 
                    value: row[column], 
                    winner: row['AwardWinner'], 
                    FilmID: row["FilmID"],
                    PersonID: row["PersonID"],
                    Rating: row["Your.Rating"]
                  }
                })
              })
          .enter()
          .append('td')
          .attr('class', function(d) {
            if (d.Rating != "NA") {return "watched"}
            else {return "not-watched"}
          })
          .html(function(d){
            if (d.column == 'Title' & d.value != "NA") {
              return "<a href=\"https://www.imdb.com/title/" + d.FilmID + "\">" + d.value + "</a>"
            }
            else if (d.column == 'PersonName' & d.value != "NA") {
              return "<a href=\"https://www.imdb.com/name/" + d.PersonID + "\">" + d.value + "</a>"
            }
            else if (d.column === "Num.Votes") {
              return d.value.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",")
            }
            else {
              if(d.value != "NA") {return d.value}}})
              
      document.getElementById("type-details").scrollIntoView();
     }
  }
  </script>
  
  <br clear="all"/><br/>
</div>
