---
title: "National Board of Review - Film Awards"
layout: radial
---

<section class="py-5 text-center container">
    <div class="row py-lg-5">
      <div class="col-lg-8 col-md-8 mx-auto">
        <h1 class="fw-light">National Board of Review</h1>
        <h3 class="fw-light">Annual Awards</h3>
        <p class="lead text-muted">
          "Since first citing year-end cinematic achievements in 1929, NBR has recognized a vast selection of outstanding studio, independent, foreign-language, animated and documentary films."
        </p>
      </div>
    </div>
</section>

<section class="container">
  <svg width="960" height="960" class="center"></svg>
</section>

<script>
  var svg = d3.select("svg.radial"),
      width = +svg.attr("width"),
      height = +svg.attr("height"),
      innerRadius = 130,
      outerRadius = Math.min(width, height) / 2,
      g = svg.append("g").attr("transform", "translate(" + width / 2 + "," + height / 2 + ")");

  var x = d3.scaleBand()
      .range([0, 2 * Math.PI])
      .align(0);

  var y = d3.scaleRadial()
      .range([innerRadius, outerRadius]);

  var z = d3.scaleOrdinal()
      .range(["#D8FFDB", "#023535", "#7b6888", "#6b486b", "#a05d56", "#d0743c", "#ff8c00"]);

  var tooltip = svg.append("text")
      .style('display', 'block')
      .attr("text-anchor", "middle")
      .attr("font-family", "sans-serif")
      .attr("dominant-baseline", "central")
      .attr("font-size", "20px")
      .attr("transform", "translate(" + width / 2 + "," + height / 2 + ")")
      .text('National Board of Review');

  d3.csv("https://jacobmgreer.github.io/Media-Consumption/datasets/NBR/NBRSummary.csv", function(d, i, columns) {
    for (i = 1, t = 0; i < columns.length; ++i) t += d[columns[i]] = +d[columns[i]];
    d.total = t;
    return d;
  }, function(error, data) {
    if (error) throw error;

    x.domain(data.map(function(d) { return d.Year; }));
    y.domain([0, d3.max(data, function(d) { return d.total; })]);
    z.domain(data.columns.slice(1));
    
    g.append("g")
      .selectAll("g")
      .data(d3.stack().keys(data.columns.slice(1))(data))
      .enter().append("g")
        .attr("fill", function(d) { return z(d.key); })
      .selectAll("path")
      .data(function(d) { return d; })
      .enter().append("path")
        .attr("d", d3.arc()
            .innerRadius(function(d) { return y(d[0]); })
            .outerRadius(function(d) { return y(d[1]); })
            .startAngle(function(d) { return x(d.data.Year); })
            .endAngle(function(d) { return x(d.data.Year) + x.bandwidth(); })
            .padAngle(0.01)
            .padRadius(innerRadius))
      .on('mouseover', function(d) {
        tooltip
          .attr("font-size", "45px")
          .text(d.data.Year)})
      .on('click', function(d) {
        awardTable(d.data.Year)})
      .on('mouseout', function(d) {
        tooltip
          .attr("font-size", "20px")
          .text('National Board of Review');});
  });
</script>
