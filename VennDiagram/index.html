<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Intersections in Film Awards/Selections</title>
<style>
body {
    font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    font-size: 12px;
}
</style>
</head>

<body>
    <div id="venn"></div>
    <div id="warnings">
        <h3 id="warnings-count"></h3>
    </div>
</body>

<style>
.venntooltip {
  position: absolute;
  text-align: center;
  width: 128px;
  height: 16px;
  background: #333;
  color: #ddd;
  padding: 2px;
  border: 0px;
  border-radius: 8px;
  opacity: 0;
}
</style>

<script src="https://d3js.org/d3.v4.min.js"></script>
<script src="venn.js"></script>
<script src="Venn.json"></script>

<script>
var console = window.console;
var count = 0;
console.log = function(msg){
  if(msg.includes('not represented on screen'))
    myFunc(msg);
}

function getintersect(msg) {
  return sets.filter(
      function(data){return data.Warnings == msg}
  );
}

function myFunc(msg){
    msg = msg.replace('WARNING: area ','').replace(' not represented on screen','');
    var intersecty = getintersect(msg);
    count++;
    d3.select("#warnings-count").text(count + " intersects out of " + Object.keys(sets).length + " not shown");

    if (intersecty[0].size > 50) {
        d3.select("#warnings").append("p").text(msg + " " + intersecty[0].size);
    }
}


var chart = venn.VennDiagram()
                 .width(960)
                 .height(960);

var div = d3.select("#venn")
div.datum(sets).call(chart);

d3.selectAll("text").style("fill", "#444");

var tooltip = d3.select("body").append("div")
    .attr("class", "venntooltip");

div.selectAll("path")
    .style("stroke-opacity", 0)
    .style("stroke", "#fff")
    .style("stroke-width", 3)

div.selectAll("g")
    .on("mouseover", function(d, i) {
        // sort all the areas relative to the current item
        venn.sortAreas(div, d);

        // Display a tooltip with the current size
        tooltip.transition().duration(400).style("opacity", .9);
        tooltip.text(d.size + " films");

        // highlight the current path
        var selection = d3.select(this).transition("tooltip").duration(400);
        selection.select("path")
            .style("fill-opacity", d.sets.length == 1 ? .4 : .1)
            .style("stroke-opacity", 1);
    })

    .on("mousemove", function() {
        tooltip.style("left", (d3.event.pageX) + "px")
               .style("top", (d3.event.pageY - 28) + "px");
    })

    .on("mouseout", function(d, i) {
        tooltip.transition().duration(400).style("opacity", 0);
        var selection = d3.select(this).transition("tooltip").duration(400);
        selection.select("path")
            .style("fill-opacity", d.sets.length == 1 ? .25 : .0)
            .style("stroke-opacity", 0);
    });
</script>
</html>
